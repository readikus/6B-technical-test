server:
  port: ${PORT:3002}
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sixbee_health}?stringtype=unspecified
    username: ${POSTGRES_USER:sixbee}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  jwt:
    # No default — JwtService validates at construction and throws if
    # missing or < 32 bytes. Matches the NestJS backend which also
    # fails fast at module instantiation.
    secret: ${JWT_SECRET:}
    expiration-ms: 28800000
  encryption:
    # No default — EncryptionService validates at construction and
    # throws if missing or not a valid 64-char hex string.
    key: ${ENCRYPTION_KEY:}
  admin:
    email: ${ADMIN_EMAIL:admin@sixbee.health}
    # Default meets the seed's complexity requirement (12+ chars,
    # upper/lower/digit/symbol). Override in .env.
    password: ${ADMIN_PASSWORD:Ch4ngeMe!Now123}
  cookie:
    # Defaults to true. Set COOKIE_SECURE=false only for local HTTP
    # dev. Production deployments must serve over HTTPS. NODE_ENV is
    # deliberately not the deciding factor — that previously caused
    # silent cookie downgrades when NODE_ENV was unset or mistyped.
    secure: ${COOKIE_SECURE:true}
  cors:
    origins: ${CORS_ORIGIN:http://localhost:3000}
