spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

app:
  jwt:
    secret: test-jwt-secret-that-is-long-enough-for-hmac-sha
    expiration-ms: 28800000
  encryption:
    key: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
  admin:
    email: admin@test.com
    # Must meet the SeedRunner complexity policy: 12+ chars with
    # upper/lower/digit/symbol. Used by @SpringBootTest integration
    # tests that load the full context.
    password: T3st!Password123
  cors:
    origins: http://localhost:3000
  # Effectively disable rate limiting for most integration tests so
  # they don't trip the per-IP limit after a handful of logins.
  # The dedicated RateLimitIntegrationTest overrides these with
  # @TestPropertySource to exercise the real limits.
  throttle:
    login-limit: 10000
    global-limit: 10000
    login-window-ms: 60000
    global-window-ms: 60000
  # Disable the netty-socketio lifecycle in tests so multiple
  # cached @SpringBootTest contexts in the same JVM don't fight
  # over port 3003. The bean still exists (so AppointmentBroadcaster
  # injection works), it just never binds to a port.
  websocket:
    enabled: false
